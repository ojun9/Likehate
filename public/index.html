<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>好き嫌いメモ帳</title>
  <meta name="description" content="好き嫌いメモ帳は、自分の好きなもの・嫌いなものを静かに残しておける個人ノートアプリです。">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      color: #333;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 196, 208, 0.38), transparent 28%),
        radial-gradient(circle at 84% 78%, rgba(151, 220, 232, 0.34), transparent 30%),
        linear-gradient(180deg, #FFF7F5 0%, #F3FBFC 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(80, 70, 70, 0.08);
      border-radius: 28px;
      padding: 48px 28px;
      box-shadow: 0 16px 48px rgba(92, 70, 70, 0.12);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 auto;
      max-width: 560px;
      font-size: 16px;
      line-height: 1.9;
      color: #555;
    }

    .note {
      margin-top: 28px;
      display: inline-flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      color: #666;
      font-size: 13px;
    }

    .note span {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(80, 70, 70, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <h1>好き嫌いメモ帳</h1>

      <p>
        好き嫌いメモ帳は、自分の好きなもの・嫌いなものを
        そっと書き留めておける個人ノートアプリです。
        気持ちを大げさに整理しすぎず、日々の感覚を静かに残せます。
      </p>

      <div class="note" aria-label="アプリの特徴">
        <span>好きなものを残す</span>
        <span>避けたいものを忘れない</span>
        <span>自分だけのメモ帳</span>
      </div>
    </div>
  </main>
</body>
</html>
